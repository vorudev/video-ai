services:
  minio:
    image: minio/minio
    container_name: my_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

  minio-init:
    image: minio/mc
    container_name: minio_init
    depends_on:
      - minio
    networks:
      - app_network
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        mc mb myminio/media || true;
        mc anonymous set download myminio/media;
        exit 0;
      "

  postgres:
    image: postgres:16-alpine
    container_name: my_postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  adminer:
    image: adminer
    container_name: my_adminer
    restart: always
    depends_on:
      - postgres
    networks:
      - app_network

  app:
    build:
      context: .
      args:
        - RESEND_API_KEY=re_bxUUxnaG_HC8yieURHHeVAgP2DYNxB1Xf
        - NEXT_PUBLIC_C15T_URL=https://clipreel-europe-onboarding.c15t.dev
    container_name: my_app
    restart: always
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydatabase
      BETTER_AUTH_SECRET: TZpIiFwuWkzDq1Hhe94XnT7QHGOtpQ8C
      RESEND_API_KEY: re_bxUUxnaG_HC8yieURHHeVAgP2DYNxB1Xf
      YANDEX_API_KEY: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      ASSEMBLYAI_API_KEY: 15ecb7c743984aaaa5a54d0277adf80c
      NEXT_PUBLIC_C15T_URL: https://clipreel-europe-onboarding.c15t.dev
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      MINIO_SECRET_KEY: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      MINIO_BUCKET: media
      NODE_ENV: production
      PORT: 3000
      FFMPEG_SERVICE_URL: http://ffmpeg-service:3001  # ← Добавлено
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    depends_on:
      - postgres
      - minio
      - ffmpeg-service  # ← Добавлено
    networks:
      - app_network

  ffmpeg-service:  # ← Новый сервис
    build: ./ffmpeg-service
    container_name: my_ffmpeg_service
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      MINIO_SECRET_KEY: AQVNwMXBHzn5LmJC_tVpH0T8xIhYDQQbyYCiH5Mg
      MINIO_BUCKET: media
    volumes:
      - ffmpeg-temp:/app/temp  # Для временных файлов
    depends_on:
      - minio
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: my_nginx
    restart: always
    ports:
      - "80:80"
      - "3333:3333"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static:/var/www/static:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
      - adminer
      - ffmpeg-service  # ← Добавлено
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    container_name: my_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  minio-data:
  ffmpeg-temp:  # ← Новый volume

networks:
  app_network:
    driver: bridge