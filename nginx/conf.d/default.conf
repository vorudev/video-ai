# Adminer
server {
    listen 443 ssl;
    server_name db.clipreel.ru;
    ssl_certificate /etc/letsencrypt/live/clipreel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipreel.ru/privkey.pem;
    location / {
        proxy_pass http://adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS
server {
    listen 80;
    server_name clipreel.ru www.clipreel.ru db.clipreel.ru minio.clipreel.ru minioadmin.clipreel.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# MinIO API (порт 9000)
server {
    listen 443 ssl;
    server_name minio.clipreel.ru;
    ssl_certificate /etc/letsencrypt/live/clipreel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipreel.ru/privkey.pem;

    ignore_invalid_headers off;
    client_max_body_size 0;
    proxy_buffering off;

    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;
        proxy_read_timeout 900;
        proxy_connect_timeout 300;
        chunked_transfer_encoding off;
    }
}

# MinIO UI (порт 9001)
server {
    listen 443 ssl;
    server_name minioadmin.clipreel.ru;
    ssl_certificate /etc/letsencrypt/live/clipreel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipreel.ru/privkey.pem;
    ignore_invalid_headers off;
    client_max_body_size 0;
    proxy_buffering off;
    location / {
        proxy_pass http://minio:9001;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        chunked_transfer_encoding off;
    }
}
# HTTPS
# HTTPS
server {
    listen 443 ssl;
    server_name clipreel.ru www.clipreel.ru;
    ssl_certificate /etc/letsencrypt/live/clipreel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipreel.ru/privkey.pem;

    location /static {
        alias /var/www/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /s3/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

